<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peak Purpose – Sticker Group Creator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #f1f5f9;
      color: #1a1411;
      font-family: 'Inter', system-ui, sans-serif;
      padding: 1rem;
    }

    .wrapper {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .header {
      background: #fff;
      border-radius: 1rem;
      padding: 1.25rem 1.5rem;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }
    .header h1 { font-size: 1.75rem; font-weight: 700; color: #1a1411; }

    .grid {
      display: grid;
      gap: 1.5rem;
    }
    @media (min-width: 1024px) {
      .grid { grid-template-columns: 280px 1fr; }
    }

    .sidebar {
      background: #fff;
      border-radius: 1rem;
      padding: 1.25rem 1.5rem;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }

    .section-label { font-size: .875rem; font-weight: 600; margin-bottom: .5rem; color: #64748b; }
    .mt6 { margin-top: 1.5rem; }

    .upload-label {
      display: inline-flex;
      cursor: pointer;
      border-radius: 50px;
      background: #1a1411;
      color: #fff;
      padding: .6rem 1.5rem;
      font-size: .875rem;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .upload-label:hover { opacity: 0.9; }

    /* --- UPDATED THUMBNAILS DESIGN --- */
    .thumbs-row {
      display: flex;
      gap: 1rem;
      overflow-x: auto;
      padding: 1rem 0.5rem;
      scrollbar-width: none;
    }
    .thumbs-row::-webkit-scrollbar { display: none; }

    .thumb-item { position: relative; width: 90px; height: 90px; flex-shrink: 0; }
    
    .thumb-card { 
        width: 100%; 
        height: 100%; 
        border-radius: 12px; 
        overflow: hidden; 
        background: #1a1411; 
        position: relative;
        padding: 2px; /* Gap for gradient border */
        background: linear-gradient(135deg, #d4af37 0%, #1a1411 50%, #d4af37 100%);
    }
    .thumb-card img { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      border-radius: 10px;
      display: block;
    }
    
    .thumb-remove {
      position: absolute; 
      top: 6px; 
      right: 6px;
      width: 22px; 
      height: 22px; 
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.7); 
      color: white; 
      border: 1px solid rgba(255, 255, 255, 0.3); 
      cursor: pointer;
      display: flex; 
      align-items: center; 
      justify-content: center; 
      font-size: 12px;
      z-index: 10;
    }

    /* --- CANVAS AREA --- */
    .canvas-area {
      background: rgba(0, 0, 0, 0.09);
      border-radius: 1rem;
      padding: 2rem;
      display: flex;
      justify-content: center;
      overflow: auto;
      min-height: 600px;
    }

    .page-inner {
      position: relative;
      background: #fff;
      background-image: radial-gradient(rgba(0,0,0,0.1) 1px, transparent 1px);
      background-size: 20px 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .img-handle { position: absolute; cursor: move; touch-action: none; }
    .img-handle img { width: 100%; height: 100%; display: block; pointer-events: none; }
    
    .resize-handle {
      position: absolute; width: 16px; height: 16px;
      bottom: -8px; right: -8px; cursor: se-resize;
      background: #4f46e5; border: 2px solid white; border-radius: 50%;
      z-index: 100;
    }

    .download-btn {
      width: 100%; border: none; border-radius: 50px; height: 52px;
      padding: 0.8rem; font-weight: 600; color: #fff;
      background: #4f46e5; cursor: pointer; margin-top: 1rem;
      transition: transform 0.1s;
    }
    .download-btn:active { transform: scale(0.98); }
    .download-btn:disabled { background: #cbd5e1; cursor: not-allowed; }
  </style>
</head>
<body>

<div class="wrapper">
  <header class="header">
    <h1>PEAK PURPOSE</h1>
    <p>Unified Sticker Creator — All images form one single border</p>
  </header>

  <section class="grid">
    <aside class="sidebar">
      <div class="mt6">
        <p class="section-label">1. UPLOAD</p>
        <label class="upload-label" for="image-upload">Add New Photos</label>
        <input id="image-upload" type="file" accept="image/*" multiple style="display:none" />
      </div>

      <div class="mt6">
        <p class="section-label">2. LAYERS</p>
        <div id="thumbs-container" class="thumbs-row"></div>
      </div>

      <div class="mt6">
        <button class="download-btn" id="download-btn" disabled>Download Unified Sticker</button>
      </div>
    </aside>

    <div class="canvas-area">
      <div class="page-inner" id="page-inner" style="width: 1123px; height: 794px;"></div>
    </div>
  </section>
</div>

<script>
(function () {
  const PAGE = { width: 1123, height: 794 };
  const API_KEY = 'gsmknu7wkzSQPmRyzcr2z8UG'; 
  let images = [];

  const imageUpload = document.getElementById('image-upload');
  const thumbsContainer = document.getElementById('thumbs-container');
  const downloadBtn = document.getElementById('download-btn');
  const pageInner = document.getElementById('page-inner');

  imageUpload.addEventListener('change', async (e) => {
    const files = Array.from(e.target.files || []);
    for (const file of files) {
      const id = 'img-' + Date.now() + Math.random().toString(36).substr(2, 5);
      const newImg = { id, src: URL.createObjectURL(file), x: 100, y: 100, width: 300, height: 300, isLoading: true };
      images.push(newImg);
      render();

      try {
        const formData = new FormData();
        formData.append('image_file', file);
        formData.append('size', 'auto');
        const res = await fetch('https://api.remove.bg/v1.0/removebg', {
          method: 'POST', headers: { 'X-Api-Key': API_KEY }, body: formData
        });
        if (res.ok) {
          const blob = await res.blob();
          const idx = images.findIndex(i => i.id === id);
          if (idx !== -1) {
            images[idx].src = URL.createObjectURL(blob);
            images[idx].isLoading = false;
          }
        }
      } catch (err) { console.error(err); }
      render();
    }
  });

  function render() {
    thumbsContainer.innerHTML = '';
    pageInner.innerHTML = '';
    
    images.forEach((img, idx) => {
      // Create Thumbnail with Gradient Card
      const thumb = document.createElement('div');
      thumb.className = 'thumb-item';
      thumb.innerHTML = `
        <div class="thumb-card">
            <img src="${img.src}">
        </div>
        <button class="thumb-remove">✕</button>`;
      
      thumb.querySelector('.thumb-remove').onclick = () => {
        images.splice(idx, 1);
        render();
      };
      thumbsContainer.appendChild(thumb);

      if (!img.isLoading) {
        const handle = document.createElement('div');
        handle.className = 'img-handle';
        handle.style.cssText = `left:${img.x}px; top:${img.y}px; width:${img.width}px; height:${img.height}px; z-index:${idx};`;
        
        const el = document.createElement('img');
        el.src = img.src;
        handle.appendChild(el);

        const resizer = document.createElement('div');
        resizer.className = 'resize-handle';
        handle.appendChild(resizer);

        pageInner.appendChild(handle);
        makeDraggable(handle, img);
        makeResizable(resizer, handle, img);
      }
    });
    downloadBtn.disabled = images.filter(i => !i.isLoading).length === 0;
  }

  function makeDraggable(el, img) {
    let sx, sy, ox, oy;
    el.onmousedown = (e) => {
      if (e.target.className === 'resize-handle') return;
      sx = e.clientX; sy = e.clientY; ox = img.x; oy = img.y;
      document.onmousemove = (me) => {
        img.x = ox + (me.clientX - sx);
        img.y = oy + (me.clientY - sy);
        el.style.left = img.x + 'px'; el.style.top = img.y + 'px';
      };
      document.onmouseup = () => document.onmousemove = null;
    };
  }

  function makeResizable(resizer, el, img) {
    let sx, sw, sh;
    resizer.onmousedown = (e) => {
      e.stopPropagation();
      sx = e.clientX; sw = img.width; sh = img.height;
      const ratio = sh / sw;
      document.onmousemove = (me) => {
        img.width = Math.max(50, sw + (me.clientX - sx));
        img.height = img.width * ratio;
        el.style.width = img.width + 'px'; el.style.height = img.height + 'px';
      };
      document.onmouseup = () => document.onmousemove = null;
    };
  }

  downloadBtn.onclick = async () => {
    const ready = images.filter(i => !i.isLoading);
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    
    const loadedImages = await Promise.all(ready.map(imgObj => {
        return new Promise((resolve) => {
            const imgEl = new Image();
            imgEl.crossOrigin = "anonymous";
            imgEl.onload = () => resolve({el: imgEl, data: imgObj});
            imgEl.src = imgObj.src;
        });
    }));

    loadedImages.forEach(item => {
      minX = Math.min(minX, item.data.x); minY = Math.min(minY, item.data.y);
      maxX = Math.max(maxX, item.data.x + item.data.width); maxY = Math.max(maxY, item.data.y + item.data.height);
    });

    const thickness = 14; 
    const padding = thickness + 20;
    const canvas = document.createElement('canvas');
    canvas.width = (maxX - minX) + (padding * 2);
    canvas.height = (maxY - minY) + (padding * 2);
    const ctx = canvas.getContext('2d');

    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = canvas.width;
    tempCanvas.height = canvas.height;
    const tCtx = tempCanvas.getContext('2d');

    loadedImages.forEach(item => {
        const rx = (item.data.x - minX) + padding;
        const ry = (item.data.y - minY) + padding;
        tCtx.drawImage(item.el, rx, ry, item.data.width, item.data.height);
    });

    ctx.save();
    // Use white for a clean sticker border
    for (let angle = 0; angle < 360; angle += 10) {
        const dx = Math.cos(angle * Math.PI / 180) * thickness;
        const dy = Math.sin(angle * Math.PI / 180) * thickness;
        ctx.drawImage(tempCanvas, dx, dy);
    }

    ctx.globalCompositeOperation = 'source-in';
    ctx.fillStyle = 'white'; // White sticker border
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.restore();

    // Add a subtle drop shadow to the border
    ctx.shadowColor = 'rgba(0,0,0,0.2)';
    ctx.shadowBlur = 10;
    ctx.shadowOffsetY = 4;

    loadedImages.forEach(item => {
        const rx = (item.data.x - minX) + padding;
        const ry = (item.data.y - minY) + padding;
        ctx.drawImage(item.el, rx, ry, item.data.width, item.data.height);
    });

    const link = document.createElement('a');
    link.download = 'unified-sticker.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  };

})();
</script>
</body>
</html>
